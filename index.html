<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 F1 Live Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>2026 F1 CHAMPIONSHIP</h1>
        <div id="status">Syncing 2026 Live Data...</div>
    </header>

    <div class="main-container">
        <div class="track-section">
            <h2>DRIVERS</h2>
            <div id="drivers-track" class="track">
                <div id="drivers-layer" class="track-layer"></div>
            </div>
        </div>

        <div class="track-section">
            <h2>TEAMS</h2>
            <div id="constructors-track" class="track">
                <div id="constructors-layer" class="track-layer"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
